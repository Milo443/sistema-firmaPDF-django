{% extends "core/base.html" %}

{% block title %}Contraseña Cambiada | FirmING{% endblock %}

{% block page_content %}
<div class="min-h-[calc(100vh-160px)] flex items-center justify-center p-4" x-data="{ show: false }" x-init="setTimeout(() => show = true, 100)">
    <div 
        class="w-full max-w-md glass-card p-10 shadow-2xl text-center transition-all duration-700 transform"
        x-show="show"
        x-transition:enter="transition ease-out duration-700"
        x-transition:enter-start="opacity-0 scale-95 translate-y-8"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
    >
        <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-emerald-500/20">
            <i class="pi pi-check-circle text-4xl"></i>
        </div>
        
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-4">¡Todo listo!</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
            Tu contraseña ha sido restablecida correctamente. Ahora puedes iniciar sesión con tu nueva clave.
        </p>

        <a href="{% url 'login' %}" class="btn-primary w-full py-4 text-lg font-bold">
            Iniciar Sesión
        </a>
    </div>
</div>
{% endblock %}
