services:
  firma-app:
    # Construye la imagen local y la etiqueta con este nombre
    build: .
    image: milo443/firma-pdf:latest
    container_name: firma-pdf-django
    restart: always

    # Mapeo de puertos (acceso directo o via proxy)
    ports:
      - "8000:8000"

    # Conexión a la red de tu Nginx Proxy (asegúrate de que exista en la VPS)
    networks:
      - web_network

    # Archivo .env para variables como SECRET_KEY, DEBUG, etc.
    env_file:
      - .env

    volumes:
      # Persistencia para la base de datos SQLite
      - ./db.sqlite3:/app/db.sqlite3
      # Persistencia para los archivos media (PDFs subidos/firmados)
      - ./media:/app/media
      # NOTA: staticfiles NO se monta como volumen porque collectstatic
      # ya embebe los archivos en la imagen durante el docker build

networks:
  web_network:
    external: true
